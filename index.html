<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Master Dashboard</title>
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; --card: #ffffff; --accent: #e67e22; --success: #27ae60; }
        body { font-family: sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        header { background: var(--dark); color: white; padding: 1.5rem; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .tool-section { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: var(--primary); }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-blue { background: var(--primary); }
        .btn-orange { background: var(--accent); width: 100%; margin-top: 5px; }
        .btn-green { background: var(--success); width: 100%; margin-bottom: 15px; }
        #keywordResult { background: #f1f5f9; padding: 12px; border-radius: 6px; font-size: 14px; min-height: 40px; border-left: 4px solid var(--primary); margin-bottom: 10px; }
        .code-box { background: #2d3436; color: #fab1a0; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 11px; word-break: break-all; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚀 SEO 자동화 센터</h1>
    </header>

    <div class="tool-section">
        <h3>📢 구글 로봇 강제 호출</h3>
        <button class="btn-green" onclick="sendPing()">지금 내 사이트로 구글 로봇 부르기</button>
    </div>

    <div class="tool-section">
        <h3>🔍 백링크 코드 생성기</h3>
        <div class="input-group">
            <input type="text" id="mainKeyword" placeholder="키워드 입력 (예: 캠핑)">
            <button class="btn-blue" onclick="generateNow()">코드 생성</button>
        </div>
        <div id="keywordResult">키워드를 입력하고 버튼을 누르세요.</div>
        
        <div id="backlinkDisplay" style="display:none;">
            <p style="font-size: 13px; font-weight: bold;">📋 아래 코드를 복사해서 블로그/게시판에 붙이세요</p>
            <div class="code-box" id="htmlCode"></div>
            <button class="btn-orange" onclick="copyResult()">HTML 코드 복사하기</button>
        </div>
    </div>
</div>

<script>
    // 1. 구글 핑 전송 함수
    function sendPing() {
        // 현재 브라우저 주소를 가져오거나 직접 입력
        const myUrl = window.location.href;
        const pingUrl = "https://www.google.com/ping?sitemap=" + encodeURIComponent(myUrl);
        
        // 새 창으로 열기 (팝업 차단 해제 필요)
        window.open(pingUrl, '_blank');
        alert("구글 로봇에게 주소를 보냈습니다!");
    }

    // 2. 백링크 코드 생성 함수
    function generateNow() {
        const keyInput = document.getElementById('mainKeyword');
        const resultArea = document.getElementById('keywordResult');
        const display = document.getElementById('backlinkDisplay');
        const codeBox = document.getElementById('htmlCode');

        if (!keyInput.value) {
            alert("키워드를 입력해주세요!");
            return;
        }

        const keyword = keyInput.value;
        const myUrl = window.location.href; // 현재 페이지 주소

        // 결과 화면 표시
        resultArea.innerHTML = "✅ 관련 키워드: " + keyword + " 추천, " + keyword + " 순위, " + keyword + " 후기";
        
        // HTML 백링크 태그 생성
        const htmlTag = '<a href="' + myUrl + '" target="_blank"><b>' + keyword + ' 정보 더보기</b></a>';
        codeBox.innerText = htmlTag;
        display.style.display = 'block';
    }

    // 3. 복사 함수
    function copyResult() {
        const text = document.getElementById('htmlCode').innerText;
        navigator.clipboard.writeText(text).then(function() {
            alert("코드가 복사되었습니다! 원하는 곳에 붙여넣으세요.");
        }, function() {
            alert("복사에 실패했습니다. 직접 드래그해서 복사해주세요.");
        });
    }
</script>

</body>
</html>
